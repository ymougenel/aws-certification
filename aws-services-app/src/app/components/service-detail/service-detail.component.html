@if (service) {
  <div class="container mt-4">
    <div class="row">
      <div class="col-12">
        <button class="btn back-button mb-4" (click)="goBack()">
          <i class="fas fa-arrow-left me-2"></i>
          Back to Dashboard
        </button>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <div class="card border-0 shadow-lg aws-card-static">
          <div class="card-header bg-transparent border-0 pt-4 pb-3">
            <div class="d-flex align-items-center">
              <div class="service-icon me-3">
                <i [class]="service.icon"></i>
              </div>
              <div>
                <h1 class="mb-1 text-primary-theme">{{ service.name }}</h1>
                <p class="text-secondary-theme mb-0">{{ service.description }}</p>
              </div>
            </div>
          </div>
          <div class="card-body pt-0">
            <div class="markdown-content" [innerHTML]="markdownContent">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
}

@if (!service && !loading) {
  <div class="container mt-4">
    <div class="row">
      <div class="col-12 text-center">
        <h2>Service Not Found</h2>
        <p>The requested AWS service could not be found.</p>
        <button class="btn back-button" (click)="goBack()">
          <i class="fas fa-arrow-left me-2"></i>
          Back to Dashboard
        </button>
      </div>
    </div>
  </div>
}

@if (loading) {
  <div class="container mt-4">
    <div class="row">
      <div class="col-12 text-center">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-3">Loading service details...</p>
      </div>
    </div>
  </div>
}
